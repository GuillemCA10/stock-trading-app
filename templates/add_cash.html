{% extends "layout.html" %}

{% block title %}
    Add Cash
{% endblock %}

{% block main %}
    <h2>Add Cash</h2>

    <form action="/add_cash" method="post">
        <input
            name="amount"
            type="number"
            step="0.01"
            min="0.01"
            placeholder="Amount"
        >
        <button type="submit">Add</button>
    </form>
{% endblock %}
